<!DOCTYPE html>
<html lang="en">
<head>

    <title>Document</title>
    <style>
        table,th,td{
            border: 1px solid black;
        }
        th,td{
            padding:10px;
        }
        th{
            text-align: left;
        }
        
    </style>
</head>
<body>
    <h2> Horizontal Heading</h2>
    <table style="width:20%;">
        <TR>
            <th>Name</th>
            <th>age</th>
        </TR>
        <tr>
            <td>Pratiksha</td>
            <td>24</td>
        </tr>
        <tr>
            <td>Chetan</td>
            <td>26</td>
        </tr></table>

        <h2>Vertical Heading</h2>

        <table style="width:20%;">
            <tr>
            <th>Name :</th>
            <td>Pratiksha</td>
        </tr>
        <tr>
            <th>Age :</th>
            <td>52</td>
        </tr>

        </table>
        
    
</body>
